# Local/dev orchestration only. NOT a production manifest.
# Secrets are read from a local .env file (see .env.example) — never commit it.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zeval_dev}
      POSTGRES_USER: ${POSTGRES_USER:-zeval}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zeval} -d ${POSTGRES_DB:-zeval_dev}"]
      interval: 2s
      retries: 10

  engine:
    build: .
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE in .env}
      SESSION_SIGNING_SALT: ${SESSION_SIGNING_SALT:?set SESSION_SIGNING_SALT in .env}
      SESSION_ENCRYPTION_SALT: ${SESSION_ENCRYPTION_SALT:?set SESSION_ENCRYPTION_SALT in .env}
      LIVE_VIEW_SIGNING_SALT: ${LIVE_VIEW_SIGNING_SALT:?set LIVE_VIEW_SIGNING_SALT in .env}
      PHX_HOST: ${PHX_HOST:-localhost}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      ENGINE_PORT: "4000"
      LOG_LEVEL: info
      POOL_SIZE: "10"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
