name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  MIX_ENV: test

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zeval
          POSTGRES_PASSWORD: zeval
          POSTGRES_DB: zeval_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zeval"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - run: mix deps.get
      - run: mix deps.compile

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      # Reports style/refactor findings without hard-failing the build.
      # Tighten by removing --mute-exit-status once the backlog is cleared.
      - name: Credo
        run: mix credo --strict --mute-exit-status

      - name: Sobelow (security)
        run: mix sobelow --root apps/zeval_web --skip --exit

      - name: Migrate
        run: mix ecto.create && mix ecto.migrate

      - name: Tests with coverage
        run: mix coveralls

  dialyzer:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - name: Cache PLT
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            priv/plts
          key: ${{ runner.os }}-plt-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-plt-
      - run: mix deps.get
      - run: mix dialyzer --format short
